<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .main-image {
            width: 400px;
            max-width: 90vw;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .login-button {
            background-color: #fff;
            color: #667eea;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.3);
            background-color: #f0f0f0;
        }

        .login-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="col-sm-12 text-center ">
				<img src="/content/queen.jpg" alt="queen" style="margin: auto;width:80%">
		  </div>
		
			<div class="col-sm-12 text-center " style="margin-top: 20px;">	 
				<a class="login-button" href="https://www.gprocurement.go.th/new_index.html">
						   เข้าสู่เว็บไซต์ระบบจัดซื้อจัดจ้างภาครัฐ</a>
			</div>
    </div>

</body>
</html>
